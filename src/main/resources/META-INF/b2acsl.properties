# Valor padrão do mock (true=simula Frama-C, false=executa Frama-C real)
# Definido em tempo de build: make build-jar MOCK=true ou make build-jar MOCK=false
b2acsl.mock=${b2acsl.mock}

# Caminho nos includes gerados (AcslLibIncludes): vazio = só caminhos relativos.
# Segmento opcional antes de set_functions/..., ex. import → .../import/set_functions/belongs.acsl
b2acsl.acslLibIncludeMiddle=import

# Opcional: pasta no disco com set_functions/, relation_functions/, … (conteúdo de ACSL_Lib).
# Útil se o executável não carregar /ACSL_Lib/... do classpath (ex.: wrapper sem uber-jar).
# b2acsl.acslLibSourceDir=

# Espelho durante a geração: especificação .acsl + import/ (funções e axiomas transitivos).
# b2acsl.targetAcslDir=target/b2acsl-acsl
